name: CI

# Editor-free gates for the MCP server (Bun / TypeScript). The live-editor pytest
# oracle (tests/) needs an Unreal install and is not run here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: server (bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint canonical tool names
        run: bun run lint:names

      # Editor-free unit + protocol tests only. The integration suites under
      # test/integration/ self-skip when no editor is reachable (editorReady()),
      # so we run the top-level files explicitly to keep CI deterministic.
      - name: Test (editor-free)
        run: bun test test/*.test.ts
